<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAD-I 계정 삭제</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 36px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 8px; font-size: 28px; font-weight: 900; color: #1a3a6b; }
    .subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 14px; }
    .warning-box {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .warning-icon { font-size: 20px; flex-shrink: 0; }
    .warning-text { font-size: 14px; color: #c53030; line-height: 1.5; }
    h3 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
    .data-list { list-style: none; margin-bottom: 24px; }
    .data-list li {
      padding: 7px 0;
      font-size: 14px;
      color: #444;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e53e3e; }
    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    .checkbox-label input { margin-top: 3px; accent-color: #e53e3e; }
    .checkbox-label span { font-size: 13px; color: #444; line-height: 1.5; }
    .btn-delete {
      width: 100%;
      padding: 14px;
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #c53030; }
    .btn-delete:disabled { background: #ccc; cursor: not-allowed; }
    .btn-cancel {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    #msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #msg.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    #msg.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .loading { display: inline-block; width: 18px; height: 18px;
      border: 2px solid #fff; border-top: 2px solid transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛣️ ROAD-I</div>
    <div class="subtitle">계정 및 데이터 삭제 요청</div>

    <div class="warning-box">
      <span class="warning-icon">⚠️</span>
      <div class="warning-text">
        계정 삭제 후에는 모든 데이터가 <strong>즉시 영구 삭제</strong>되며,
        어떠한 방법으로도 복구할 수 없습니다.
      </div>
    </div>

    <h3>삭제되는 데이터</h3>
    <ul class="data-list">
      <li><span>📍</span> 실시간 위치 기록 전체</li>
      <li><span>💬</span> 그룹 채팅 메시지</li>
      <li><span>📅</span> 모임 일정 및 그룹 정보</li>
      <li><span>🏠</span> 저장된 개인 장소</li>
      <li><span>👤</span> 프로필 (이름, 닉네임)</li>
      <li><span>🔔</span> 푸시 알림 설정</li>
      <li><span>🏪</span> 샵 구독 및 제안 내역</li>
    </ul>

    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="가입한 이메일 주소">

    <label for="pw">비밀번호</label>
    <input type="password" id="pw" placeholder="현재 비밀번호">

    <label class="checkbox-label">
      <input type="checkbox" id="agree">
      <span>모든 데이터가 즉시 삭제되며 복구할 수 없음을 이해하고 동의합니다.</span>
    </label>

    <button class="btn-delete" id="deleteBtn" onclick="deleteAccount()">
      계정 영구 삭제
    </button>
    <button class="btn-cancel" onclick="history.back()">취소</button>

    <div id="msg"></div>
  </div>

  <script>
    // ⚠️ 아래 값들을 실제 배포 환경에 맞게 수정하세요
    const APPWRITE_ENDPOINT = 'https://YOUR_APPWRITE_ENDPOINT/v1';
    const PROJECT_ID = '684a32e40002f3045e7f';
    const FUNCTION_URL = 'https://YOUR_FUNCTION_ENDPOINT/delete-user-account';

    async function deleteAccount() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      const agreed = document.getElementById('agree').checked;
      const btn = document.getElementById('deleteBtn');
      const msg = document.getElementById('msg');

      msg.style.display = 'none';

      if (!email || !pw) {
        showMsg('이메일과 비밀번호를 입력해주세요.', 'error');
        return;
      }
      if (!agreed) {
        showMsg('삭제에 동의해주세요.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        // Step 1: 이메일/비밀번호로 세션 생성 (본인 확인)
        const sessionRes = await fetch(`${APPWRITE_ENDPOINT}/account/sessions/email`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
          },
          body: JSON.stringify({ email, password: pw }),
        });

        if (!sessionRes.ok) {
          const err = await sessionRes.json();
          throw new Error(err.message || '로그인 실패. 이메일 또는 비밀번호를 확인해주세요.');
        }

        const session = await sessionRes.json();

        // Step 2: Cloud Function으로 계정 + 데이터 삭제
        const delRes = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
            'x-appwrite-user-id': session.userId,
          },
          body: JSON.stringify({ userId: session.userId }),
        });

        const result = await delRes.json();
        if (result.success) {
          showMsg('✅ 계정이 성공적으로 삭제되었습니다. ROAD-I를 이용해 주셔서 감사합니다.', 'success');
          document.getElementById('deleteBtn').style.display = 'none';
        } else {
          throw new Error(result.error || '서버 오류가 발생했습니다.');
        }
      } catch (e) {
        showMsg('❌ ' + e.message, 'error');
        btn.disabled = false;
        btn.textContent = '계정 영구 삭제';
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = type;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
