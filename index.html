<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROAD-I アカウント削除 / Account Deletion / 계정 삭제</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 36px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 8px; font-size: 28px; font-weight: 900; color: #1a3a6b; }
    .subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 14px; }
    .warning-box {
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .warning-icon { font-size: 20px; flex-shrink: 0; }
    .warning-text { font-size: 14px; color: #c53030; line-height: 1.5; }
    h3 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
    .data-list { list-style: none; margin-bottom: 24px; }
    .data-list li {
      padding: 7px 0;
      font-size: 14px;
      color: #444;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #e53e3e; }
    .checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    .checkbox-label input { margin-top: 3px; accent-color: #e53e3e; }
    .checkbox-label span { font-size: 13px; color: #444; line-height: 1.5; }
    .btn-delete {
      width: 100%;
      padding: 14px;
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-delete:hover { background: #c53030; }
    .btn-delete:disabled { background: #ccc; cursor: not-allowed; }
    .btn-cancel {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    #msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #msg.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    #msg.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .loading { display: inline-block; width: 18px; height: 18px;
      border: 2px solid #fff; border-top: 2px solid transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 언어 전환 버튼 ── */
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 20px;
    }
    .lang-btn {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 20px;
      background: transparent;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.active {
      background: #1a3a6b;
      color: #fff;
      border-color: #1a3a6b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-bar">
      <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>

    <div class="logo">🛣️ ROAD-I</div>
    <div class="subtitle" id="txt-subtitle">계정 및 데이터 삭제 요청</div>

    <div class="warning-box">
      <span class="warning-icon">⚠️</span>
      <div class="warning-text" id="txt-warning">
        계정 삭제 후에는 모든 데이터가 <strong>즉시 영구 삭제</strong>되며,
        어떠한 방법으로도 복구할 수 없습니다.
      </div>
    </div>

    <h3 id="txt-data-title">삭제되는 데이터</h3>
    <ul class="data-list">
      <li><span>📍</span> <span id="txt-data1">실시간 위치 기록 전체</span></li>
      <li><span>💬</span> <span id="txt-data2">그룹 채팅 메시지</span></li>
      <li><span>📅</span> <span id="txt-data3">모임 일정 및 그룹 정보</span></li>
      <li><span>🏠</span> <span id="txt-data4">저장된 개인 장소</span></li>
      <li><span>👤</span> <span id="txt-data5">프로필 (이름, 닉네임)</span></li>
      <li><span>🔔</span> <span id="txt-data6">푸시 알림 설정</span></li>
      <li><span>🏪</span> <span id="txt-data7">샵 구독 및 제안 내역</span></li>
    </ul>

    <label for="email" id="txt-label-email">이메일</label>
    <input type="email" id="email" placeholder="가입한 이메일 주소">

    <label for="pw" id="txt-label-pw">비밀번호</label>
    <input type="password" id="pw" placeholder="현재 비밀번호">

    <label class="checkbox-label">
      <input type="checkbox" id="agree">
      <span id="txt-agree">모든 데이터가 즉시 삭제되며 복구할 수 없음을 이해하고 동의합니다.</span>
    </label>

    <button class="btn-delete" id="deleteBtn" onclick="deleteAccount()">
      <span id="txt-btn-delete">계정 영구 삭제</span>
    </button>
    <button class="btn-cancel" onclick="history.back()" id="txt-btn-cancel">취소</button>

    <div id="msg"></div>
  </div>

  <script>
    // ⚠️ 아래 값들을 실제 배포 환경에 맞게 수정하세요
    const APPWRITE_ENDPOINT = 'https://YOUR_APPWRITE_ENDPOINT/v1';
    const PROJECT_ID = '684a32e40002f3045e7f';
    const FUNCTION_URL = 'https://YOUR_FUNCTION_ENDPOINT/delete-user-account';

    // ── 다국어 텍스트 ──────────────────────────────────────────────
    const TEXTS = {
      ko: {
        subtitle:    '계정 및 데이터 삭제 요청',
        warning:     '계정 삭제 후에는 모든 데이터가 <strong>즉시 영구 삭제</strong>되며, 어떠한 방법으로도 복구할 수 없습니다.',
        dataTitle:   '삭제되는 데이터',
        data1:       '실시간 위치 기록 전체',
        data2:       '그룹 채팅 메시지',
        data3:       '모임 일정 및 그룹 정보',
        data4:       '저장된 개인 장소',
        data5:       '프로필 (이름, 닉네임)',
        data6:       '푸시 알림 설정',
        data7:       '샵 구독 및 제안 내역',
        labelEmail:  '이메일',
        phEmail:     '가입한 이메일 주소',
        labelPw:     '비밀번호',
        phPw:        '현재 비밀번호',
        agree:       '모든 데이터가 즉시 삭제되며 복구할 수 없음을 이해하고 동의합니다.',
        btnDelete:   '계정 영구 삭제',
        btnCancel:   '취소',
        errInput:    '이메일과 비밀번호를 입력해주세요.',
        errAgree:    '삭제에 동의해주세요.',
        successMsg:  '✅ 계정이 성공적으로 삭제되었습니다. ROAD-I를 이용해 주셔서 감사합니다.',
        loginFail:   '로그인 실패. 이메일 또는 비밀번호를 확인해주세요.',
        serverErr:   '서버 오류가 발생했습니다.',
      },
      en: {
        subtitle:    'Account & Data Deletion Request',
        warning:     'Once deleted, all your data will be <strong>permanently removed immediately</strong> and cannot be recovered by any means.',
        dataTitle:   'Data to be deleted',
        data1:       'All real-time location history',
        data2:       'Group chat messages',
        data3:       'Meeting schedules & group info',
        data4:       'Saved personal places',
        data5:       'Profile (name, nickname)',
        data6:       'Push notification settings',
        data7:       'Shop subscriptions & proposals',
        labelEmail:  'Email',
        phEmail:     'Registered email address',
        labelPw:     'Password',
        phPw:        'Current password',
        agree:       'I understand that all data will be immediately deleted and cannot be recovered.',
        btnDelete:   'Permanently Delete Account',
        btnCancel:   'Cancel',
        errInput:    'Please enter your email and password.',
        errAgree:    'Please agree to the deletion.',
        successMsg:  '✅ Your account has been successfully deleted. Thank you for using ROAD-I.',
        loginFail:   'Login failed. Please check your email or password.',
        serverErr:   'A server error occurred.',
      },
      ja: {
        subtitle:    'アカウント・データ削除リクエスト',
        warning:     'アカウントを削除すると、すべてのデータが<strong>即時に完全削除</strong>され、いかなる方法でも復元できません。',
        dataTitle:   '削除されるデータ',
        data1:       'リアルタイム位置情報の全履歴',
        data2:       'グループチャットメッセージ',
        data3:       'イベントのスケジュールおよびグループ情報',
        data4:       '保存した個人の場所',
        data5:       'プロフィール（名前、ニックネーム）',
        data6:       'プッシュ通知の設定',
        data7:       'ショップのサブスクリプションおよび提案履歴',
        labelEmail:  'メールアドレス',
        phEmail:     '登録したメールアドレス',
        labelPw:     'パスワード',
        phPw:        '現在のパスワード',
        agree:       'すべてのデータが即時に削除され、復元できないことを理解し同意します。',
        btnDelete:   'アカウントを完全に削除する',
        btnCancel:   'キャンセル',
        errInput:    'メールアドレスとパスワードを入力してください。',
        errAgree:    '削除に同意してください。',
        successMsg:  '✅ アカウントが正常に削除されました。ROAD-Iをご利用いただきありがとうございました。',
        loginFail:   'ログインに失敗しました。メールアドレスまたはパスワードを確認してください。',
        serverErr:   'サーバーエラーが発生しました。',
      },
    };

    let currentLang = 'ko';

    function setLang(lang) {
      currentLang = lang;
      const t = TEXTS[lang];
      document.documentElement.lang = lang;

      document.getElementById('txt-subtitle').textContent    = t.subtitle;
      document.getElementById('txt-warning').innerHTML       = t.warning;
      document.getElementById('txt-data-title').textContent  = t.dataTitle;
      document.getElementById('txt-data1').textContent       = t.data1;
      document.getElementById('txt-data2').textContent       = t.data2;
      document.getElementById('txt-data3').textContent       = t.data3;
      document.getElementById('txt-data4').textContent       = t.data4;
      document.getElementById('txt-data5').textContent       = t.data5;
      document.getElementById('txt-data6').textContent       = t.data6;
      document.getElementById('txt-data7').textContent       = t.data7;
      document.getElementById('txt-label-email').textContent = t.labelEmail;
      document.getElementById('email').placeholder           = t.phEmail;
      document.getElementById('txt-label-pw').textContent    = t.labelPw;
      document.getElementById('pw').placeholder              = t.phPw;
      document.getElementById('txt-agree').textContent       = t.agree;
      document.getElementById('txt-btn-delete').textContent  = t.btnDelete;
      document.getElementById('txt-btn-cancel').textContent  = t.btnCancel;

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === langLabel(lang));
      });
    }

    function langLabel(lang) {
      return { ko: '한국어', en: 'English', ja: '日本語' }[lang];
    }

    // URL 파라미터로 초기 언어 설정
    (function() {
      const p = new URLSearchParams(window.location.search).get('lang');
      if (p && TEXTS[p]) setLang(p);
    })();

    async function deleteAccount() {
      const t = TEXTS[currentLang];
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      const agreed = document.getElementById('agree').checked;
      const btn = document.getElementById('deleteBtn');
      const msg = document.getElementById('msg');

      msg.style.display = 'none';

      if (!email || !pw) { showMsg(t.errInput, 'error'); return; }
      if (!agreed)       { showMsg(t.errAgree, 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        // Step 1: 이메일/비밀번호로 세션 생성 (본인 확인)
        const sessionRes = await fetch(`${APPWRITE_ENDPOINT}/account/sessions/email`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
          },
          body: JSON.stringify({ email, password: pw }),
        });

        if (!sessionRes.ok) {
          const err = await sessionRes.json();
          throw new Error(err.message || t.loginFail);
        }

        const session = await sessionRes.json();

        // Step 2: Cloud Function으로 계정 + 데이터 삭제
        const delRes = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Appwrite-Project': PROJECT_ID,
            'x-appwrite-user-id': session.userId,
          },
          body: JSON.stringify({ userId: session.userId }),
        });

        const result = await delRes.json();
        if (result.success) {
          showMsg(t.successMsg, 'success');
          document.getElementById('deleteBtn').style.display = 'none';
        } else {
          throw new Error(result.error || t.serverErr);
        }
      } catch (e) {
        showMsg('❌ ' + e.message, 'error');
        btn.disabled = false;
        document.getElementById('txt-btn-delete').textContent = TEXTS[currentLang].btnDelete;
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.innerHTML = text;
      msg.className = type;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
